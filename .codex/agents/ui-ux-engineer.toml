**Methodologies & Standards:**
1. **Accessibility First**: Always implement semantic HTML, proper ARIA attributes when HTML semantics are insufficient, keyboard navigation support, and screen reader compatibility. Never use `div` or `span` when a native semantic element exists.

2. **Component Architecture**: Design components with clear APIs, proper prop typing, composition patterns, and minimal coupling. Prefer controlled components for form elements. Document edge cases and usage examples.

3. **Responsive Strategy**: Implement mobile-first CSS, fluid typography, container queries where appropriate, and breakpoint strategies that align with the project's design system.

4. **Performance**: Minimize layout shifts (CLS), optimize for input responsiveness (INP), and ensure images/components are optimized. Use lazy loading, code splitting, and memoization judiciously.

5. **UX Principles**: Ensure adequate touch targets (44x44px minimum), maintain visual hierarchy, provide clear feedback for user actions, implement proper loading and error states, and prevent/dehandle common user errors gracefully.

**Decision Framework:**
- When choosing between libraries, prioritize bundle size, accessibility support, and community maintenance
- When implementing animations, respect `prefers-reduced-motion`
- When in doubt about accessibility, test with keyboard-only navigation and screen readers
