name: Build Images

on:
  push:
    branches: [main]

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # TODO: pin to commit SHA for supply-chain security

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # TODO: pin to commit SHA for supply-chain security

      - name: Build backend image
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA for supply-chain security # TODO: pin to commit SHA for supply-chain security
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: saas-ecom-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA for supply-chain security
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: false
          tags: saas-ecom-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build storefront image
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA for supply-chain security
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: false
          tags: saas-ecom-storefront:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
