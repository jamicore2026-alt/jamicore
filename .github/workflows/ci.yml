name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: saas_ecom
          POSTGRES_PASSWORD: saas_ecom_test_pass
          POSTGRES_DB: saas_ecom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://saas_ecom:saas_ecom_test_pass@localhost:5432/saas_ecom_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci-only-do-not-use-in-production
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Setup test environment
        run: |
          cat > apps/backend/.env <<EOF
          DATABASE_URL=postgresql://saas_ecom:saas_ecom_test_pass@localhost:5432/saas_ecom_test
          REDIS_URL=redis://localhost:6379
          JWT_SECRET=test-jwt-secret-for-ci-only-do-not-use-in-production
          NODE_ENV=test
          EOF

      - name: Sync database schema
        run: pnpm --filter backend db:push

      - name: Test
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Build
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t saas-ecom-backend:test .

      - name: Build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t saas-ecom-dashboard:test .

      - name: Build storefront image
        run: docker build -f apps/storefront/Dockerfile -t saas-ecom-storefront:test .
