name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: saas_ecom
          POSTGRES_PASSWORD: saas_ecom_test_pass
          POSTGRES_DB: saas_ecom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://saas_ecom:saas_ecom_test_pass@localhost:5432/saas_ecom_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci-only-do-not-use-in-production
      NODE_ENV: test
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Security checks
        run: |
          node scripts/check-storeid.js
          node scripts/check-prehandler.js
          node scripts/check-console.js

      - name: Setup test env
        run: |
          cat > apps/backend/.env <<EOF
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          JWT_SECRET=${JWT_SECRET}
          NODE_ENV=${NODE_ENV}
          EOF

      - name: Sync database
        run: pnpm --filter backend db:push

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker-validate:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Build backend image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: saas-ecom-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: false
          tags: saas-ecom-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build storefront image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: false
          tags: saas-ecom-storefront:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build storefront-food image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/storefront-food/Dockerfile
          push: false
          tags: saas-ecom-storefront-food:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build landing image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/landing/Dockerfile
          push: false
          tags: saas-ecom-landing:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
