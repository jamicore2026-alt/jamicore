name: Debug Logs

on:
  workflow_dispatch:

jobs:
  dump-logs:
    runs-on: ubuntu-latest
    environment: Spaceship
    steps:
      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          RAW_KEY="${{ secrets.VM_SSH_KEY }}"
          if echo "$RAW_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY\|BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY'; then
            printf '%s\n' "$RAW_KEY" > ~/.ssh/deploy_key
          else
            printf '%s\n' "$RAW_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || {
            echo "::error:: SSH key is invalid"
            exit 1
          }

      - name: Debug database state
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
        run: |
          SSH_PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -p $SSH_PORT"

          echo "=== Check drizzle migrations table ==="
          ssh $SSH_OPTS "$VM_USER@$VM_IP" "docker exec spaceship_postgres psql -U spaceship -d spaceship -c 'SELECT * FROM __drizzle_migrations;'" || true
          echo ""

          echo "=== List all tables ==="
          ssh $SSH_OPTS "$VM_USER@$VM_IP" "docker exec spaceship_postgres psql -U spaceship -d spaceship -c '\\dt'" || true
          echo ""

          echo "=== Run migrate.js with full output ==="
          ssh $SSH_OPTS "$VM_USER@$VM_IP" "docker compose -f ~/spaceship/docker-compose.prod.yml exec -T backend node apps/backend/dist/migrate.js" || true
          echo ""

          echo "=== Check if drizzle-kit is available ==="
          ssh $SSH_OPTS "$VM_USER@$VM_IP" "docker compose -f ~/spaceship/docker-compose.prod.yml exec -T backend npx drizzle-kit --version" || true
