name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@67d4f4bd878003202723fa4c3e8d1f5ca04ff0c4 # v4.5.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true
