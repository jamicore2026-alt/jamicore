name: Deploy to Spaceship VM

on:
  # Deploy only after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual deploy (skips CI gate)
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────
  build-and-push:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront-food
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/storefront-food/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront-food:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VM via SSH ────────────────────────────────────────────
  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Spaceship
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate secrets
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${{ secrets.VM_IP }}" ]] && missing+=(VM_IP)
          [[ -z "${{ secrets.VM_USER }}" ]] && missing+=(VM_USER)
          [[ -z "${{ secrets.VM_SSH_KEY }}" ]] && missing+=(VM_SSH_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error:: Missing required secrets in Spaceship environment: ${missing[*]}"
            echo "::error:: Add them at Settings > Environments > Spaceship > Environment secrets"
            exit 1
          fi
          echo "[Validate] All required secrets present."

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          RAW_KEY="${{ secrets.VM_SSH_KEY }}"

          # Determine if key is base64-encoded or raw PEM
          if echo "$RAW_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY\|BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY'; then
            printf '%s\n' "$RAW_KEY" > ~/.ssh/deploy_key
          else
            printf '%s\n' "$RAW_KEY" | base64 -d > ~/.ssh/deploy_key
          fi

          chmod 600 ~/.ssh/deploy_key

          # Validate key format
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || {
            echo "::error:: SSH key is invalid or has unsupported format"
            exit 1
          }
          echo "[SSH] Key validated successfully."

      - name: Deploy to VM
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ env.OWNER }}
          GITHUB_SHA: ${{ github.sha }}
          API_DOMAIN: ${{ vars.API_DOMAIN || '' }}
          DASHBOARD_DOMAIN: ${{ vars.DASHBOARD_DOMAIN || '' }}
          STOREFRONT_DOMAIN: ${{ vars.STOREFRONT_DOMAIN || '' }}
          STOREFRONT_FOOD_DOMAIN: ${{ vars.STOREFRONT_FOOD_DOMAIN || '' }}
        run: |
          set -euo pipefail

          SSH_PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -p $SSH_PORT"
          # scp uses -P (uppercase) for port, ssh uses -p (lowercase)
          SCP_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -P $SSH_PORT"

          echo "[Deploy] Target: $VM_USER@$VM_IP:$SSH_PORT"
          echo "[Deploy] SHA:    $GITHUB_SHA"
          echo "[Deploy] Images: $REGISTRY/$OWNER/saas-ecom/*:$GITHUB_SHA"

          # Ensure remote deploy directory exists
          ssh $SSH_OPTS "$VM_USER@$VM_IP" "
            mkdir -p ~/spaceship/scripts
          "

          # Copy deploy script to VM
          scp $SCP_OPTS scripts/deploy-remote.sh "$VM_USER@$VM_IP:~/spaceship/scripts/"

          # Run deployment on VM
          ssh $SSH_OPTS "$VM_USER@$VM_IP" \
            "DEPLOY_DIR=~/spaceship \
             REGISTRY=$REGISTRY \
             OWNER=$OWNER \
             GITHUB_SHA=$GITHUB_SHA \
             VM_IP=$VM_IP \
             API_DOMAIN=$API_DOMAIN \
             DASHBOARD_DOMAIN=$DASHBOARD_DOMAIN \
             STOREFRONT_DOMAIN=$STOREFRONT_DOMAIN \
             STOREFRONT_FOOD_DOMAIN=$STOREFRONT_FOOD_DOMAIN \
             GITHUB_TOKEN=$GITHUB_TOKEN \
             bash ~/spaceship/scripts/deploy-remote.sh"
