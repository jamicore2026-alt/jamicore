name: Deploy to OCI

on:
  # Deploy only after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual deploy (skips CI gate)
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    timeout-minutes: 45
    runs-on: ubuntu-22.04
    environment: OCIDEPLOY
    # Only deploy if CI succeeded (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.OCI_HOST }}" ]] && missing+=(OCI_HOST)
          [[ -z "${{ secrets.OCI_USER }}" ]] && missing+=(OCI_USER)
          [[ -z "${{ secrets.OCI_SSH_PRIVATE_KEY }}" ]] && missing+=(OCI_SSH_PRIVATE_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error:: Missing required secrets in OCIDEPLOY environment: ${missing[*]}"
            echo "::error:: Add them at Settings > Environments > OCIDEPLOY > Environment secrets"
            exit 1
          fi
          echo "[Validate] All required secrets present."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to OCI VM
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ env.OWNER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e

          # Decode SSH key
          RAW_KEY="$OCI_SSH_PRIVATE_KEY"
          if echo "$RAW_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY\|BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY'; then
            printf '%s\n' "$RAW_KEY" > /tmp/deploy_key
          else
            printf '%s\n' "$RAW_KEY" | base64 -d > /tmp/deploy_key
          fi
          chmod 600 /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key > /dev/null 2>&1 || { echo "SSH key is INVALID"; exit 1; }
          echo "SSH key validated."

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i /tmp/deploy_key"

          # Build remote deploy script
          VM_IP="$OCI_HOST"
          printf '%s\n' \
            'set -e' \
            "VM_IP=\"$VM_IP\"" \
            'cd ~/jamicore || exit 1' \
            '' \
            'echo "[Deploy] Authenticating to GHCR..."' \
            "echo \"$GITHUB_TOKEN\" | docker login \"$REGISTRY\" -u \"$OWNER\" --password-stdin" \
            '' \
            'echo "[Deploy] Generating .env.production..."' \
            '[ -f .env.production ] && source .env.production || true' \
            'export DB_PASSWORD=${DB_PASSWORD:=$(openssl rand -hex 32)}' \
            'export REDIS_PASSWORD=${REDIS_PASSWORD:=$(openssl rand -hex 32)}' \
            'export JWT_SECRET=${JWT_SECRET:=$(openssl rand -base64 48)}' \
            'export COOKIE_SECRET=${COOKIE_SECRET:=$(openssl rand -base64 32)}' \
            'export PAYMENT_CONFIG_ENCRYPTION_KEY=${PAYMENT_CONFIG_ENCRYPTION_KEY:=$(openssl rand -hex 32)}' \
            'export HEALTH_CHECK_KEY=${HEALTH_CHECK_KEY:=$(openssl rand -hex 16)}' \
            '{' \
            '  echo "NODE_ENV=production"' \
            '  echo "PORT=3000"' \
            '  echo "HOST=0.0.0.0"' \
            '  echo "DB_USER=saas_ecom"' \
            '  echo "DB_PASSWORD=${DB_PASSWORD}"' \
            '  echo "DB_NAME=saas_ecom"' \
            '  echo "REDIS_PASSWORD=${REDIS_PASSWORD}"' \
            '  echo "JWT_SECRET=${JWT_SECRET}"' \
            '  echo "COOKIE_SECRET=${COOKIE_SECRET}"' \
            '  echo "PAYMENT_CONFIG_ENCRYPTION_KEY=${PAYMENT_CONFIG_ENCRYPTION_KEY}"' \
            '  echo "HEALTH_CHECK_KEY=${HEALTH_CHECK_KEY}"' \
            '  echo "RESEND_API_KEY="' \
            '  echo "FROM_EMAIL=noreply@example.com"' \
            '  echo "S3_BUCKET="' \
            '  echo "S3_REGION="' \
            '  echo "S3_ACCESS_KEY_ID="' \
            '  echo "S3_SECRET_ACCESS_KEY="' \
            '  echo "STRIPE_SECRET_KEY="' \
            '  echo "STRIPE_WEBHOOK_SECRET="' \
            '  echo "MIXPANEL_TOKEN="' \
            '  echo "LOG_LEVEL=info"' \
            '  echo "CORS_ORIGINS="' \
            '  echo "TRUST_PROXY_HOPS=1"' \
            '  echo "STOREFRONT_URL=${STOREFRONT_URL:=http://${VM_IP}:3002}"' \
            '  echo "API_BASE_URL=${API_BASE_URL:=http://${VM_IP}:3000}"' \
            '  echo "API_DOMAIN=${VM_IP}"' \
            '  echo "DASHBOARD_DOMAIN=${VM_IP}"' \
            '  echo "STOREFRONT_DOMAIN=${VM_IP}"' \
            '  echo "DASHBOARD_ORIGIN=http://${VM_IP}:3001"' \
            '  echo "STOREFRONT_ORIGIN=http://${VM_IP}:3002"' \
            '  echo "SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-$(openssl rand -base64 32)}"' \
            '} > .env.production.new' \
            'mv .env.production.new .env.production' \
            'chmod 600 .env.production' \
            'set -a' \
            'source .env.production' \
            'set +a' \
            '' \
            'echo "[Deploy] Pulling latest code..."' \
            'git fetch origin main' \
            'git reset --hard origin/main' \
            '' \
            "BACKEND_IMAGE=\"$REGISTRY/$OWNER/saas-ecom/backend:$GITHUB_SHA\"" \
            "DASHBOARD_IMAGE=\"$REGISTRY/$OWNER/saas-ecom/dashboard:$GITHUB_SHA\"" \
            "STOREFRONT_IMAGE=\"$REGISTRY/$OWNER/saas-ecom/storefront:$GITHUB_SHA\"" \
            'sed -i "s|image: saas-ecom-backend:.*|image: $BACKEND_IMAGE|" docker-compose.prod.yml || true' \
            'sed -i "s|image: saas-ecom-dashboard:.*|image: $DASHBOARD_IMAGE|" docker-compose.prod.yml || true' \
            'sed -i "s|image: saas-ecom-storefront:.*|image: $STOREFRONT_IMAGE|" docker-compose.prod.yml || true' \
            '' \
            'echo "[Deploy] Pulling app images..."' \
            'docker-compose -f docker-compose.prod.yml pull backend dashboard storefront' \
            '' \
            'echo "[Deploy] Recreating app containers..."' \
            'docker-compose -f docker-compose.prod.yml up -d backend dashboard storefront' \
            '' \
            'echo "[Deploy] Running migrations..."' \
            'docker-compose -f docker-compose.prod.yml exec -T backend node apps/backend/dist/migrate.js || echo "Migration skipped"' \
            '' \
            'echo "[Deploy] Seeding database..."' \
            'docker-compose -f docker-compose.prod.yml exec -T -e SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-$(openssl rand -base64 32)} backend node apps/backend/dist/seed-superadmin.js || echo "Seed skipped"' \
            '' \
            'echo "[Deploy] Pruning old images..."' \
            'docker image prune -f --filter "dangling=true"' \
            '' \
            'echo "[Deploy] Health check..."' \
            'sleep 10' \
            'curl -sf http://localhost:3000/health && echo " Backend OK" || echo " Backend FAILED"' \
            'curl -sf http://localhost:3001/health && echo " Dashboard OK" || echo " Dashboard FAILED"' \
            'curl -sf http://localhost:3002/health && echo " Storefront OK" || echo " Storefront FAILED"' \
            'echo "[Deploy] Done!"' \
            > /tmp/deploy_script.sh

          ssh $SSH_OPTS "$OCI_USER@$OCI_HOST" "bash -s" < /tmp/deploy_script.sh
