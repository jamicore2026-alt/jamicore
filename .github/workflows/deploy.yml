name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: OCIDEPLOY
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.OCI_HOST }}" ]] && missing+=(OCI_HOST)
          [[ -z "${{ secrets.OCI_USER }}" ]] && missing+=(OCI_USER)
          [[ -z "${{ secrets.OCI_SSH_PRIVATE_KEY }}" ]] && missing+=(OCI_SSH_PRIVATE_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error:: Missing required secrets in OCIDEPLOY environment: ${missing[*]}"
            echo "::error:: Add them at Settings > Environments > OCIDEPLOY > Environment secrets"
            exit 1
          fi
          echo "[Validate] All required secrets present."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/backend:${{ github.sha }}"
          docker build -f apps/backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build and push dashboard
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/dashboard:${{ github.sha }}"
          docker build -f apps/dashboard/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build and push storefront
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Decode SSH key
        run: |
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          echo "SSH key decoded. Checking format..."
          head -1 /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key > /dev/null 2>&1 && echo "Key is valid" || echo "Key is INVALID"

      - name: Deploy to OCI VM
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key_path: /tmp/deploy_key
          timeout: 30m
          debug: true
          script: |
            set -e
            cd ~/jamicore || exit 1

            echo "[Deploy] Ensuring docker-compose dependencies..."
            sudo apt-get update -qq && sudo apt-get install -y -qq python3-setuptools openssl curl || true

            echo "[Deploy] Ensuring docker-compose v2..."
            if ! docker compose version >/dev/null 2>&1; then
              sudo curl -fsSL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              docker-compose version
            fi

            echo "[Deploy] Generating .env.production..."
            # Preserve existing secrets (especially DB/REDIS passwords) so persisted volumes remain valid
            if [ -f .env.production ]; then
              source .env.production
            fi
            rm -f .env.production
            export DB_PASSWORD=${DB_PASSWORD:-$(openssl rand -hex 32)}
            export REDIS_PASSWORD=${REDIS_PASSWORD:-$(openssl rand -hex 32)}
            export JWT_SECRET=${JWT_SECRET:-$(openssl rand -base64 48)}
            export COOKIE_SECRET=${COOKIE_SECRET:-$(openssl rand -base64 32)}
            export PAYMENT_CONFIG_ENCRYPTION_KEY=${PAYMENT_CONFIG_ENCRYPTION_KEY:-$(openssl rand -hex 32)}
            export HEALTH_CHECK_KEY=${HEALTH_CHECK_KEY:-$(openssl rand -hex 16)}
            echo "NODE_ENV=production" > .env.production
            echo "PORT=3000" >> .env.production
            echo "HOST=0.0.0.0" >> .env.production
            echo "DB_USER=saas_ecom" >> .env.production
            echo "DB_PASSWORD=${DB_PASSWORD}" >> .env.production
            echo "DB_NAME=saas_ecom" >> .env.production
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> .env.production
            echo "JWT_SECRET=${JWT_SECRET}" >> .env.production
            echo "COOKIE_SECRET=${COOKIE_SECRET}" >> .env.production
            echo "PAYMENT_CONFIG_ENCRYPTION_KEY=${PAYMENT_CONFIG_ENCRYPTION_KEY}" >> .env.production
            echo "HEALTH_CHECK_KEY=${HEALTH_CHECK_KEY}" >> .env.production
            echo "RESEND_API_KEY=" >> .env.production
            echo "FROM_EMAIL=noreply@example.com" >> .env.production
            echo "S3_BUCKET=" >> .env.production
            echo "S3_REGION=" >> .env.production
            echo "S3_ACCESS_KEY_ID=" >> .env.production
            echo "S3_SECRET_ACCESS_KEY=" >> .env.production
            echo "STRIPE_SECRET_KEY=" >> .env.production
            echo "STRIPE_WEBHOOK_SECRET=" >> .env.production
            echo "MIXPANEL_TOKEN=" >> .env.production
            echo "LOG_LEVEL=info" >> .env.production
            echo "CORS_ORIGINS=" >> .env.production
            echo "TRUST_PROXY_HOPS=1" >> .env.production
            export API_BASE_URL=${API_BASE_URL:-http://localhost:3000}
            export STOREFRONT_URL=${STOREFRONT_URL:-http://localhost:3002}
            echo "STOREFRONT_URL=${STOREFRONT_URL}" >> .env.production
            echo "API_BASE_URL=${API_BASE_URL}" >> .env.production
            # Use VM public IP for domains so IP-based access works via Caddy
            export VM_IP="${{ secrets.OCI_HOST }}"
            echo "API_DOMAIN=${VM_IP}" >> .env.production
            echo "DASHBOARD_DOMAIN=${VM_IP}" >> .env.production
            echo "STOREFRONT_DOMAIN=${VM_IP}" >> .env.production
            chmod 600 .env.production
            echo "::warning:: Generated fresh .env.production with random secrets. Update these manually after deploy!"

            echo "[Deploy] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[Deploy] Updating docker-compose with new image tags..."
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/backend:${{ github.sha }}"
            export DASHBOARD_IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/dashboard:${{ github.sha }}"
            export STOREFRONT_IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront:${{ github.sha }}"

            # Substitute image tags in compose file
            sed -i "s|image: saas-ecom-backend:.*|image: $BACKEND_IMAGE|" docker-compose.prod.yml || true
            sed -i "s|image: saas-ecom-dashboard:.*|image: $DASHBOARD_IMAGE|" docker-compose.prod.yml || true
            sed -i "s|image: saas-ecom-storefront:.*|image: $STOREFRONT_IMAGE|" docker-compose.prod.yml || true

            echo "[Deploy] Pulling images from GHCR..."
            docker-compose -f docker-compose.prod.yml pull

            echo "[Deploy] Stopping and removing old containers..."
            docker-compose -f docker-compose.prod.yml down || true

            echo "[Deploy] Starting services..."
            if ! docker-compose -f docker-compose.prod.yml up -d 2>&1; then
              echo "[Deploy] Service startup failed. Dumping all service logs and status..."
              docker-compose -f docker-compose.prod.yml ps || true
              docker-compose -f docker-compose.prod.yml logs --tail=50 || true
              exit 1
            fi

            echo "[Deploy] Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T backend node dist/migrate.js || echo "Migration step skipped (ensure migrations run on startup)"

            echo "[Deploy] Pruning old images..."
            docker system prune -af --volumes=false

            echo "[Deploy] Health check..."
            sleep 5
            curl -sf http://localhost:3000/health && echo " Backend OK" || echo " Backend health check failed"
            curl -sf http://localhost:3001/health && echo " Dashboard OK" || echo " Dashboard health check failed"
            curl -sf http://localhost:3002/health && echo " Storefront OK" || echo " Storefront health check failed"

            echo "[Deploy] Done!"
