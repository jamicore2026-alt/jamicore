name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deploy reason'
        required: false
        default: 'Manual deploy'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  setup-vm:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: Spaceship
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate secrets
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${{ secrets.VM_IP }}" ]] && missing+=(VM_IP)
          [[ -z "${{ secrets.VM_USER }}" ]] && missing+=(VM_USER)
          [[ -z "${{ secrets.VM_SSH_KEY }}" ]] && missing+=(VM_SSH_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error:: Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "Secrets validated."

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          RAW_KEY="${{ secrets.VM_SSH_KEY }}"
          if echo "$RAW_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY\|BEGIN RSA PRIVATE KEY'; then
            printf '%s\n' "$RAW_KEY" > ~/.ssh/deploy_key
          else
            printf '%s\n' "$RAW_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || {
            echo "::error:: Invalid SSH key"
            exit 1
          }

      - name: Run VM setup if needed
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey"
          # Copy setup script to VM
          scp -P "$PORT" $SSH_OPTS scripts/setup-oci-vm.sh \
            "$VM_USER@$VM_IP:~/setup-oci-vm.sh"
          # Run it — script is idempotent (checks if docker exists first)
          ssh -p "$PORT" $SSH_OPTS "$VM_USER@$VM_IP" "bash ~/setup-oci-vm.sh"

  build-and-push:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [setup-vm]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push storefront-food
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/storefront-food/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/storefront-food:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push landing
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: apps/landing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-ecom/landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [setup-vm, build-and-push]
    environment: Spaceship
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate secrets
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${{ secrets.VM_IP }}" ]] && missing+=(VM_IP)
          [[ -z "${{ secrets.VM_USER }}" ]] && missing+=(VM_USER)
          [[ -z "${{ secrets.VM_SSH_KEY }}" ]] && missing+=(VM_SSH_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error:: Missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "Secrets validated."

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          RAW_KEY="${{ secrets.VM_SSH_KEY }}"
          if echo "$RAW_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY\|BEGIN RSA PRIVATE KEY'; then
            printf '%s\n' "$RAW_KEY" > ~/.ssh/deploy_key
          else
            printf '%s\n' "$RAW_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || {
            echo "::error:: Invalid SSH key"
            exit 1
          }

      - name: Copy files to VM
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey"
          ssh -p "$PORT" $SSH_OPTS "$VM_USER@$VM_IP" "mkdir -p ~/spaceship"
          scp -P "$PORT" $SSH_OPTS docker-compose.prod.yml Caddyfile Caddyfile.domain "$VM_USER@$VM_IP:~/spaceship/"
          scp -P "$PORT" $SSH_OPTS scripts/deploy-remote.sh "$VM_USER@$VM_IP:~/spaceship/"

      - name: Deploy on VM
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ env.OWNER }}
          GITHUB_SHA: ${{ github.sha }}
          API_DOMAIN: ${{ vars.API_DOMAIN || '' }}
          DASHBOARD_DOMAIN: ${{ vars.DASHBOARD_DOMAIN || '' }}
          ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN || '' }}
          STOREFRONT_DOMAIN: ${{ vars.STOREFRONT_DOMAIN || '' }}
          STOREFRONT_FOOD_DOMAIN: ${{ vars.STOREFRONT_FOOD_DOMAIN || '' }}
          LETS_ENCRYPT_EMAIL: ${{ vars.LETS_ENCRYPT_EMAIL || '' }}
        run: |
          set -euo pipefail
          PORT="${VM_SSH_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey"
          ssh -p "$PORT" $SSH_OPTS "$VM_USER@$VM_IP" \
            "DEPLOY_DIR=~/spaceship \
             REGISTRY=$REGISTRY \
             OWNER=$OWNER \
             GITHUB_SHA=$GITHUB_SHA \
             VM_IP=$VM_IP \
             API_DOMAIN=$API_DOMAIN \
             DASHBOARD_DOMAIN=$DASHBOARD_DOMAIN \
             ADMIN_DOMAIN=$ADMIN_DOMAIN \
             STOREFRONT_DOMAIN=$STOREFRONT_DOMAIN \
             STOREFRONT_FOOD_DOMAIN=$STOREFRONT_FOOD_DOMAIN \
             LETS_ENCRYPT_EMAIL=$LETS_ENCRYPT_EMAIL \
             GITHUB_TOKEN=$GITHUB_TOKEN \
             bash ~/spaceship/deploy-remote.sh"
