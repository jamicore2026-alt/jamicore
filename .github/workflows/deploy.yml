name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to OCIR
        uses: docker/login-action@74a5d142397b4f367a81941eba94e6ef881bf094 # v3.4.0
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_REGISTRY_TOKEN }}

      - name: Build and push backend
        run: |
          IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/backend:${{ github.sha }}"
          docker build -f apps/backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build and push dashboard
        run: |
          IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/dashboard:${{ github.sha }}"
          docker build -f apps/dashboard/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build and push storefront
        run: |
          IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/storefront:${{ github.sha }}"
          docker build -f apps/storefront/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to OCI VM
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f5a8c5d2b0e6b0 # v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/jamicore || exit 1

            echo "[Deploy] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[Deploy] Updating docker-compose with new image tags..."
            export BACKEND_IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/backend:${{ github.sha }}"
            export DASHBOARD_IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/dashboard:${{ github.sha }}"
            export STOREFRONT_IMAGE="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_REGISTRY_USER }}/saas-ecom/storefront:${{ github.sha }}"

            # Substitute image tags in compose file
            sed -i "s|image: saas-ecom-backend:.*|image: $BACKEND_IMAGE|" docker-compose.prod.yml || true
            sed -i "s|image: saas-ecom-dashboard:.*|image: $DASHBOARD_IMAGE|" docker-compose.prod.yml || true
            sed -i "s|image: saas-ecom-storefront:.*|image: $STOREFRONT_IMAGE|" docker-compose.prod.yml || true

            echo "[Deploy] Pulling images from OCIR..."
            docker compose -f docker-compose.prod.yml pull

            echo "[Deploy] Starting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "[Deploy] Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend node dist/migrate.js || echo "Migration step skipped (ensure migrations run on startup)"

            echo "[Deploy] Pruning old images..."
            docker system prune -af --volumes=false

            echo "[Deploy] Health check..."
            sleep 5
            curl -sf http://localhost:3000/health && echo " Backend OK" || echo " Backend health check failed"
            curl -sf http://localhost:3001/health && echo " Dashboard OK" || echo " Dashboard health check failed"
            curl -sf http://localhost:3002/health && echo " Storefront OK" || echo " Storefront health check failed"

            echo "[Deploy] Done!"
