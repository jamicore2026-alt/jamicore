name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  e2e-storefront:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: saas_ecom
          POSTGRES_PASSWORD: saas_ecom_test_pass
          POSTGRES_DB: saas_ecom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://saas_ecom:saas_ecom_test_pass@localhost:5432/saas_ecom_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-e2e-only-do-not-use-in-production
      NODE_ENV: test
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PORT: 3000
      HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "VERSION=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Build e2e-utils
        run: pnpm --filter @repo/e2e-utils build

      - name: Setup hosts
        run: echo "127.0.0.1 techgear.localhost" | sudo tee -a /etc/hosts

      - name: Sync database schema
        run: pnpm --filter backend db:push

      - name: Seed test data
        run: pnpm --filter backend db:seed

      - name: Build backend
        run: pnpm --filter backend build

      - name: Start backend
        run: pnpm --filter backend start > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sSf http://localhost:3000/health && echo " Backend ready" && exit 0
            sleep 1
          done
          echo "Backend failed to start"
          cat backend.log || true
          exit 1

      - name: Start storefront dev server
        run: pnpm --filter storefront dev > storefront.log 2>&1 &

      - name: Wait for storefront
        run: |
          for i in {1..30}; do
            curl -sSf http://localhost:5173 && echo " Storefront ready" && exit 0
            sleep 1
          done
          echo "Storefront failed to start"
          cat storefront.log || true
          exit 1

      - name: Run storefront E2E tests
        run: pnpm --filter storefront e2e

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: failure()
        with:
          name: playwright-report-storefront
          path: apps/storefront/playwright-report/
          retention-days: 7

  e2e-dashboard:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: saas_ecom
          POSTGRES_PASSWORD: saas_ecom_test_pass
          POSTGRES_DB: saas_ecom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://saas_ecom:saas_ecom_test_pass@localhost:5432/saas_ecom_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-e2e-only-do-not-use-in-production
      NODE_ENV: test
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PORT: 3000
      HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "VERSION=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Build e2e-utils
        run: pnpm --filter @repo/e2e-utils build

      - name: Sync database schema
        run: pnpm --filter backend db:push

      - name: Seed test data
        run: pnpm --filter backend db:seed

      - name: Build backend
        run: pnpm --filter backend build

      - name: Start backend
        run: pnpm --filter backend start > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sSf http://localhost:3000/health && echo " Backend ready" && exit 0
            sleep 1
