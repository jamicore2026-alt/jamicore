# ============================================
# Spaceship — Production Docker Compose Stack
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires a .env.production file with all secrets.
#
# For CI/CD deploy, the deploy script sets IMAGE env vars:
#   BACKEND_IMAGE=ghcr.io/owner/saas-ecom/backend:sha
#   DASHBOARD_IMAGE=ghcr.io/owner/saas-ecom/dashboard:sha
#   STOREFRONT_IMAGE=ghcr.io/owner/saas-ecom/storefront:sha

name: spaceship

services:
  # —— Database ——
  postgres:
    image: postgres:17-alpine
    container_name: spaceship_postgres
    restart: unless-stopped
    networks:
      - spaceship_net
    # PostgreSQL port intentionally NOT exposed to host in production
    # Access via internal Docker network only
    environment:
      POSTGRES_USER: ${DB_USER:-spaceship}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-spaceship}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-spaceship}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # —— Cache / Queue backend ——
  redis:
    image: redis:7-alpine
    container_name: spaceship_redis
    restart: unless-stopped
    networks:
      - spaceship_net
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Redis port intentionally NOT exposed to host in production
    # Access via internal Docker network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # —— Database Migration ——
  migrate:
    image: ${BACKEND_IMAGE:-saas-ecom-backend:prod}
    container_name: spaceship_migrate
    networks:
      - spaceship_net
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    command: ["node", "apps/backend/dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    stop_grace_period: 120s

  # —— Backend API ——
  backend:
    image: ${BACKEND_IMAGE:-saas-ecom-backend:prod}
    container_name: spaceship_backend
    restart: unless-stopped
    networks:
      - spaceship_net
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 5
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # —— Dashboard (SvelteKit SSR) ——
  dashboard:
    image: ${DASHBOARD_IMAGE:-saas-ecom-dashboard:prod}
    container_name: spaceship_dashboard
    restart: unless-stopped
    networks:
      - spaceship_net
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # —— Storefront (SvelteKit SSR) ——
  storefront:
    image: ${STOREFRONT_IMAGE:-saas-ecom-storefront:prod}
    container_name: spaceship_storefront
    restart: unless-stopped
    networks:
      - spaceship_net
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # —— Food Storefront (SvelteKit SSR) ——
  storefront-food:
    image: ${STOREFRONT_FOOD_IMAGE:-saas-ecom-storefront-food:prod}
    container_name: spaceship_storefront_food
    restart: unless-stopped
    networks:
      - spaceship_net
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # —— Reverse Proxy + SSL (Caddy) ——
  caddy:
    image: caddy:2-alpine
    container_name: spaceship_caddy
    restart: unless-stopped
    networks:
      - spaceship_net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - API_DOMAIN=${API_DOMAIN:-api.spaceship.dev}
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN:-dashboard.spaceship.dev}
      - STOREFRONT_DOMAIN=${STOREFRONT_DOMAIN:-spaceship.dev}
      - STOREFRONT_FOOD_DOMAIN=${STOREFRONT_FOOD_DOMAIN:-food.spaceship.dev}
    depends_on:
      - backend
      - dashboard
      - storefront
      - storefront-food
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

networks:
  spaceship_net:
    name: spaceship_net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
