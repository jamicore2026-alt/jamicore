# ============================================
# SaaS E-commerce Platform — Production Stack
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires a .env.production file with all secrets.

services:
  # ── Database ──
  postgres:
    image: postgres:17-alpine
    container_name: saas_ecom_postgres
    restart: unless-stopped
    # PostgreSQL port intentionally NOT exposed to host in production
    # Access via internal Docker network only
    environment:
      POSTGRES_USER: ${DB_USER:-saas_ecom}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-saas_ecom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saas_ecom} -d ${DB_NAME:-saas_ecom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue backend ──
  redis:
    image: redis:7-alpine
    container_name: saas_ecom_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Redis port intentionally NOT exposed to host in production
    # Access via internal Docker network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: saas_ecom_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-saas_ecom}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-saas_ecom}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Dashboard (SvelteKit SSR) ──
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: saas_ecom_dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BASE_URL: http://backend:3000
    depends_on:
      - backend

  # ── Storefront (SvelteKit SSR) ──
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    container_name: saas_ecom_storefront
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      API_BASE_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
