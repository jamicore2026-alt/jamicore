services:
  postgres:
    image: postgres:17-alpine
    container_name: saas_ecom_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas_ecom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_ecom_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-saas_ecom_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_ecom} -d ${POSTGRES_DB:-saas_ecom_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas_ecom_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-saas_ecom_redis_dev_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-saas_ecom_redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: